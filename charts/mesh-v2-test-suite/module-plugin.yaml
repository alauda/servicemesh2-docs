apiVersion: cluster.alauda.io/v1alpha1
kind: ModulePlugin
metadata:
  annotations:
    cpaas.io/built-in-plugin: "false"
    cpaas.io/display-name: '{"en": "Mesh v2 Test Suite", "zh": "Mesh v2 测试套件"}'
    cpaas.io/module-name: mesh-v2-test-suite
  labels:
    cpaas.io/module-catalog: servicemesh
    cpaas.io/module-name: mesh-v2-test-suite
    cpaas.io/module-type: plugin
    cpaas.io/product: devops
  name: mesh-v2-test-suite
spec:
  appReleases:
  - chartVersions:
    - name: asm/mesh-v2-test-suite
      releaseName: mesh-v2-test-suite
      version: v1.0.3
    name: mesh-v2-test-suite
  deleteable: true
  description:
    en: Bundles service-mesh test images plus Java OTel sample-service manifests, so ASM v2 samples run without external image pulls. Installing creates two ConfigMaps — mesh-v2-test-suite-manifest (image list) and mesh-v2-test-suite-java-otel-demo (Java OTel demo, one-click apply).
    zh: 随插件下发服务网格测试镜像及 Java OTel 示例服务清单，安装后无需访问外部镜像源即可运行 ASM v2 示例。安装会创建两个 ConfigMap：mesh-v2-test-suite-manifest（镜像清单）与 mesh-v2-test-suite-java-otel-demo（Java OTel 示例，可一键部署）。
  logo: data:image/svg+xml;base64,
  mainChart: asm/mesh-v2-test-suite
  name: mesh-v2-test-suite
  upgradeRiskLevel: low
